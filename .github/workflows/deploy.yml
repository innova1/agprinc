name: Build & Push to AWS ECR

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

env:
  AWS_REGION: us-east-2

jobs:
  # ── Detect which paths changed ────────────────────────────────────────────
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'web/**'

  # ── Test backend before building ──────────────────────────────────────────
  test-backend:
    name: Test Backend
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - run: npm ci
      - run: npm test

  # ── Build & push backend image ────────────────────────────────────────────
  build-backend:
    name: Build & Push Backend
    needs: [changes, test-backend]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && needs.changes.outputs.backend == 'true'
    env:
      ECR_REPOSITORY: agprinc-backend

    steps:
      - uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tags
        id: tags
        run: |
          REGISTRY="${{ steps.login-ecr.outputs.registry }}"
          SHA="${GITHUB_SHA::8}"
          echo "sha=${REGISTRY}/${{ env.ECR_REPOSITORY }}:${SHA}" >> $GITHUB_OUTPUT
          echo "latest=${REGISTRY}/${{ env.ECR_REPOSITORY }}:latest" >> $GITHUB_OUTPUT

      - name: Build
        run: |
          docker build \
            --tag "${{ steps.tags.outputs.sha }}" \
            --tag "${{ steps.tags.outputs.latest }}" \
            --label "git-commit=${GITHUB_SHA}" \
            --label "build-date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            ./backend

      - name: Push
        run: |
          docker push "${{ steps.tags.outputs.sha }}"
          docker push "${{ steps.tags.outputs.latest }}"

      - name: Summary
        run: |
          echo "### Backend Image Published :rocket:" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ steps.tags.outputs.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ steps.tags.outputs.latest }}\`" >> $GITHUB_STEP_SUMMARY

  # ── Build & deploy frontend to S3 ────────────────────────────────────────
  build-frontend:
    name: Build & Deploy Frontend
    needs: changes
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && needs.changes.outputs.frontend == 'true'

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: web

      - name: Build
        run: npm run build
        working-directory: web
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync to S3
        run: aws s3 sync web/dist/ s3://${{ secrets.S3_BUCKET_NAME }}/frameworks/ --delete

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"

      - name: Summary
        run: |
          echo "### Frontend Deployed :rocket:" >> $GITHUB_STEP_SUMMARY
          echo "- Synced to \`s3://${{ secrets.S3_BUCKET_NAME }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- CloudFront cache invalidated" >> $GITHUB_STEP_SUMMARY
