name: Build & Push Backend to AWS ECR

on:
  push:
    branches: [master, main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy.yml'
  pull_request:
    branches: [master, main]
    paths:
      - 'backend/**'

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: agprinc-backend

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  build-and-push:
    name: Build & Push to ECR
    needs: test
    runs-on: ubuntu-latest
    # Only push on merge to main/master (not on PRs)
    if: github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Extract metadata for Docker image
        id: meta
        run: |
          ECR_REGISTRY="${{ steps.login-ecr.outputs.registry }}"
          SHORT_SHA="${GITHUB_SHA::8}"
          echo "registry=${ECR_REGISTRY}" >> $GITHUB_OUTPUT
          echo "image=${ECR_REGISTRY}/${{ env.ECR_REPOSITORY }}" >> $GITHUB_OUTPUT
          echo "tag_sha=${ECR_REGISTRY}/${{ env.ECR_REPOSITORY }}:${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "tag_latest=${ECR_REGISTRY}/${{ env.ECR_REPOSITORY }}:latest" >> $GITHUB_OUTPUT

      - name: Build Docker image
        working-directory: backend
        run: |
          docker build \
            --tag "${{ steps.meta.outputs.tag_sha }}" \
            --tag "${{ steps.meta.outputs.tag_latest }}" \
            --label "git-commit=${GITHUB_SHA}" \
            --label "git-ref=${GITHUB_REF}" \
            --label "build-date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            .

      - name: Push images to ECR
        run: |
          docker push "${{ steps.meta.outputs.tag_sha }}"
          docker push "${{ steps.meta.outputs.tag_latest }}"

      - name: Output image details
        run: |
          echo "### Docker Image Published" >> $GITHUB_STEP_SUMMARY
          echo "- Registry: ${{ steps.meta.outputs.registry }}" >> $GITHUB_STEP_SUMMARY
          echo "- Repository: ${{ env.ECR_REPOSITORY }}" >> $GITHUB_STEP_SUMMARY
          echo "- SHA tag: ${{ steps.meta.outputs.tag_sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- Latest tag: ${{ steps.meta.outputs.tag_latest }}" >> $GITHUB_STEP_SUMMARY
